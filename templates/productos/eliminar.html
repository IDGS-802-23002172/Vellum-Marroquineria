{% extends "layout.html" %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-lg border text-center">
    <div class="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
    </div>
    
    <h2 class="text-xl font-bold mb-2">¿Eliminar Producto?</h2>
    <p class="text-gray-500 mb-6">Estás a punto de borrar <strong>{{ producto.nombre }}</strong> de la línea {{ producto.linea }}. Esta acción no se puede deshacer.</p>
    
    <form method="POST">
        <input type="hidden" name="id" value="{{ producto.id }}">
        <div class="flex flex-col gap-3">
            <button type="submit" class="w-full bg-red-600 text-white py-3 rounded-lg font-bold hover:bg-red-700 transition">
                Confirmar Eliminación
            </button>
            <a href="{{ url_for('listar_productos') }}" class="w-full py-3 text-gray-500 hover:text-gray-700 font-medium">
                No, mantener producto
            </a>
        </div>
    </form>
</div>
{% endblock %}
