version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: vellum_db
    restart: always
    environment:
      MYSQL_DATABASE: vellum_db
      MYSQL_ROOT_PASSWORD: root_password_segura 
      MYSQL_USER: vellum_user
      MYSQL_PASSWORD: vellum_password_123
    ports:
      - "3306:3306"
    volumes:
      - vellum_db_data:/var/lib/mysql

  web:
    build: .
    container_name: vellum_app
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=mysql+pymysql://vellum_user:vellum_password_123@db/vellum_db
    depends_on:
      - db

volumes:
  vellum_db_data: